name: Deploy to Elastic Beanstalk (Terraform)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  security-scan:
    name: Run Security Scan
    uses: ./.github/workflows/security-scan.yml
  backend-ci:
    name: Run Backend CI
    uses: ./.github/workflows/backend-ci.yml
  infra-approval:
    name: Infra Change Approval
    uses: ./.github/workflows/infra-approval.yml
  deploy:
    runs-on: ubuntu-latest
    needs: [security-scan, backend-ci, infra-approval]
    
    if: ${{ always() && !failure() && !cancelled() }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
        
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.10"
    - name: Deploy via Terraform
      env:
        
        TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
        TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}
        TF_VAR_vpc_id: ${{ secrets.VPC_ID }}
        TF_VAR_app_subnet_ids: ${{ secrets.APP_SUBNET_IDS }}
        TF_VAR_elb_subnet_ids: ${{ secrets.ELB_SUBNET_IDS }}
        TF_VAR_security_group_id: ${{ secrets.SECURITY_GROUP_ID }}
        TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
        TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        

      run: bash ./scripts/deploy.sh
  eb-logs:
    name: Print EB Logs
    needs: [deploy]
    
    if: failure()
    
    uses: ./.github/workflows/eb-logs.yml
    secrets: inherit
